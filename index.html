<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Sản phẩm</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 20px auto; padding: 0 15px; }
    table { width: 100%; border-collapse: collapse; margin: 15px 0; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f0f0f0; }
    #th-name { cursor: pointer; }
    tr:hover { background: #f9f9f9; }
    .form-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; background: #fafafa; }
    .form-row { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; }
    .form-row label { display: flex; flex-direction: column; gap: 3px; font-size: 13px; }
    .form-row input { padding: 5px; border: 1px solid #ccc; width: 150px; }
    #btn-add { padding: 6px 12px; background: #333; color: white; border: none; cursor: pointer; font-size: 13px; }
    #btn-add:hover { background: #555; }
    .error { color: red; font-size: 12px; margin: 5px 0; }
  </style>
</head>
<body>

  <h1>Quản lý Danh sách Sản phẩm</h1>

  <table id="product-table">
    <thead>
      <tr>
        <th>STT</th>
        <th id="th-name">Tên sản phẩm</th>
        <th>Danh mục</th>
        <th>Đơn giá</th>
        <th>Số lượng</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="form-section">
    <h2>Thêm sản phẩm mới</h2>
    <div class="form-row">
      <label>
        Tên sản phẩm
        <input type="text" id="input-name" placeholder="Tên sản phẩm">
      </label>
      <label>
        Danh mục
        <input type="text" id="input-category" placeholder="Danh mục">
      </label>
      <label>
        Đơn giá (VNĐ)
        <input type="number" id="input-price" placeholder="Đơn giá" min="1">
      </label>
      <label>
        Số lượng
        <input type="number" id="input-quantity" placeholder="Số lượng" min="1">
      </label>
    </div>
    <button id="btn-add">Thêm sản phẩm</button>
    <div class="error" id="error-msg"></div>
  </div>

  <script>
    // Mảng lưu toàn bộ dữ liệu sản phẩm (được nạp từ products.json qua AJAX)
    var products = [];

    // Trạng thái sắp xếp cột Tên sản phẩm:
    //   null -> chưa sắp xếp
    //   true -> tăng dần (A-Z)
    //   false -> giảm dần (Z-A)
    var sortAsc = null;

    // định dạng tiền việt
    function formatPrice(price) {
      return price.toLocaleString('vi-VN') + ' đ';
    }

    // xóa hàng cũ rồi render lại bảng từ mảng products
    function renderTable() {
      var tbody = document.querySelector('#product-table tbody');
      tbody.innerHTML = ''; // xóa hàng cũ

      products.forEach(function(p, index) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' + (index + 1) + '</td>' +          // stt
          '<td>' + p.name + '</td>' +
          '<td>' + p.category + '</td>' +
          '<td>' + formatPrice(p.price) + '</td>' +  // format price
          '<td>' + p.quantity + '</td>';
        tbody.appendChild(tr);
      });
    }

    // Gợi ý khung code
    var xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4 && xhr.status === 200) {
        products = JSON.parse(xhr.responseText);
        renderTable();
      }
    };
    xhr.open('GET', 'products.json');
    xhr.send();

    // Sắp xếp bảng khi click tiêu đề cột Tên sản phẩm
    var thName = document.getElementById('th-name');
    thName.addEventListener('click', function() {
      // null/false -> tăng dần; true -> giảm dần
      if (sortAsc === null || sortAsc === false) {
        sortAsc = true;
      } else {
        sortAsc = false;
      }

      // So sánh chuỗi tên để sắp xếp
      products.sort(function(a, b) {
        if (a.name < b.name) return sortAsc ? -1 : 1;
        if (a.name > b.name) return sortAsc ? 1 : -1;
        return 0;
      });

      // Cập nhật ký hiệu tăng giảm
      thName.textContent = 'Tên sản phẩm ' + (sortAsc ? '▲' : '▼');
      renderTable();
    });

    // Thêm sản phẩm mới từ form
    document.getElementById('btn-add').addEventListener('click', function() {
      // Đọc và làm sạch giá trị từ các ô input
      var name     = document.getElementById('input-name').value.trim();
      var category = document.getElementById('input-category').value.trim();
      var price    = parseFloat(document.getElementById('input-price').value);
      var quantity = parseInt(document.getElementById('input-quantity').value, 10);
      var errorMsg = document.getElementById('error-msg');

      // kiểm tra tên phải có ít nhất 3 ký tự
      if (!name || name.length < 3) {
        errorMsg.textContent = 'Tên sản phẩm không được rỗng và phải có ít nhất 3 ký tự.';
        return;
      }
      // đơn giá phải là số dương
      if (isNaN(price) || price <= 0) {
        errorMsg.textContent = 'Đơn giá phải là số dương.';
        return;
      }
      // số lượng phải là số nguyên ≥ 1
      if (isNaN(quantity) || quantity < 1 || !Number.isInteger(quantity)) {
        errorMsg.textContent = 'Số lượng phải là số nguyên lớn hơn hoặc bằng 1.';
        return;
      }

      errorMsg.textContent = ''; // xóa thông báo lỗi cũ nếu hợp lệ

      // Tạo sản phẩm mới
      var newProduct = {
        id: products.length + 1,        
        name: name,
        category: category || 'Khác',   
        price: price,
        quantity: quantity
      };
      products.push(newProduct);

      // Reset rồi render lại bảng
      sortAsc = null;
      thName.textContent = 'Tên sản phẩm';
      renderTable();

      // reset ô input
      document.getElementById('input-name').value = '';
      document.getElementById('input-category').value = '';
      document.getElementById('input-price').value = '';
      document.getElementById('input-quantity').value = '';
    });
  </script>
</body>
</html>
